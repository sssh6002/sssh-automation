# 4-2 fill_in_draft 設定(rules 已棄用 — 改由 *總結*.md 直接決定承辦文字+動作)。
#
# 「承辦文字」+「動作」由公文目錄下 *總結*.md 的前兩個 `##` 開頭行決定:
#   第 1 行  `#存查分類: <類別> <檔號>`   (單 `#`,不算)
#   第 2 行  `## <承辦文字>`                (雙 `#`,直接當承辦文字 fragment)
#   第 3 行  `### <動作>` (none/陳會/備選動作) (三 `#`,直接當動作)
# 任一欄空或不存在 → 該欄用本檔 default 對應值。
#
# template 中的 `<承辦文字>` placeholder 會被 fragment 取代。

template: |-
  擬:
  <承辦文字>，陳閱後文存查。

default:                      # 當 *總結*.md 缺承辦文字 / 動作欄時的 fallback
  承辦文字: "遵照辦理"
  動作: none
