# 標記 → 辦理文字片段 + 後續動作 對應表。改規則只動此檔。
#
# 辦理文字 = template 套上 rule.辦理文字 片段。 template 中的 `<辦理文字>` 是
# placeholder,會被 rule.辦理文字 取代。若無命中,rule.辦理文字 視為空字串。
#
# rules 依本檔由上而下評估,「越上方越優先」 — 第一個命中的標記決定一切。
# 改優先順序 = 上下搬列。
#
# 動作可填三種值:
#   none    — 只填字,不做後續動作
#   陳會    — 填字後按「陳會」鈕(會把公文流轉到下一關,不可復原)
#   備選動作 — 預留值,目前程式遇到只記 log 不執行,未來再接邏輯

template: |-
  擬:
  <辦理文字>陳閱後文存查。

default:                      # 無標記 / 標記未命中時的保守 fallback
  辦理文字: ""
  動作: none

rules:                       # 越上方越優先;第一個命中決定一切
  - 標記: 不參加
    辦理文字: "不參加，"
    動作: none
  - 標記: 資安
    辦理文字: "本案為資安宣導事項，"
    動作: 陳會
  - 標記: 設備
    辦理文字: "……（待填），"
    動作: none
